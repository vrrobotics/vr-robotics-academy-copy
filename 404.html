<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Robotics Academy</title>
    <script>
        // GitHub Pages 404 redirect for SPA
        const path = window.location.pathname;
        const redirect = path.replace(/^\/vr-robotics-academy/, '') || '/';
        sessionStorage.redirect = redirect;
        window.location.href = '/vr-robotics-academy/';
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
